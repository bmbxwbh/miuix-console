<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Miuix Console — Liquid Glass</title>
<link href="https://cdn.jsdelivr.net/npm/misans@4.1/lib/Normal/MiSans-Regular.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/misans@4.1/lib/Normal/MiSans-Medium.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/misans@4.1/lib/Normal/MiSans-Semibold.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/misans@4.1/lib/Normal/MiSans-Bold.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../core/tokens.css">
<link rel="stylesheet" href="../core/base.css">
<link rel="stylesheet" href="../core/animations.css">
<link rel="stylesheet" href="../core/glass.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--mx-font);
  background:#000;color:#fff;
}

/* ── Bing 背景 ── */
.bing-bg{
  position:fixed;inset:0;z-index:0;
  background-size:cover;background-position:center;
  transition:opacity 0.6s ease;
}
.bing-bg::after{
  content:'';position:absolute;inset:0;
  background:rgba(0,0,0,0.15);
}

/* ── 返回按钮 ── */
.back-btn{
  position:fixed;top:20px;left:20px;z-index:100;
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:10px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid rgba(255,255,255,0.1);
  color:#fff;font-size:13px;font-weight:500;
  text-decoration:none;cursor:pointer;
  transition:all 0.2s;
}
.back-btn:hover{background:rgba(0,0,0,0.5)}

/* ── 控制栏 ── */
.controls{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100;
  display:flex;gap:8px;align-items:center;
  padding:10px 16px;border-radius:14px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid rgba(255,255,255,0.1);
}
.controls button{
  padding:6px 14px;border-radius:8px;
  font-size:12px;font-weight:600;cursor:pointer;
  color:rgba(255,255,255,0.6);background:transparent;
  border:1px solid transparent;
  transition:all 0.2s;
  font-family:var(--mx-font);
}
.controls button:hover{color:#fff;background:rgba(255,255,255,0.1)}
.controls button.active{
  background:rgba(255,255,255,0.15);color:#fff;
  border-color:rgba(255,255,255,0.2);
}
.controls .sep{width:1px;height:20px;background:rgba(255,255,255,0.15)}

/* ── 居中玻璃卡片 ── */
.glass-center{
  position:fixed;inset:0;z-index:10;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.glass-card{
  pointer-events:auto;
  width:420px;max-width:90vw;
  background:rgba(255,255,255,0.18);
  backdrop-filter:blur(var(--mx-glass-blur)) saturate(var(--mx-glass-saturation));
  -webkit-backdrop-filter:blur(var(--mx-glass-blur)) saturate(var(--mx-glass-saturation));
  border:1px solid rgba(255,255,255,0.2);
  border-radius:20px;
  padding:36px 32px;
  filter:url(#mx-glass-filter);
  transition:transform 0.2s ease-out, box-shadow 0.2s ease-out;
  will-change:transform;
  position:relative;overflow:hidden;
}
.glass-card:hover{box-shadow:0 16px 64px rgba(0,0,0,0.25)}
.glass-card h2{
  font-size:22px;font-weight:700;color:#fff;margin-bottom:8px;
  text-shadow:0 1px 8px rgba(0,0,0,0.2);
}
.glass-card p{
  font-size:14px;color:rgba(255,255,255,0.8);line-height:1.7;margin-bottom:20px;
  text-shadow:0 1px 4px rgba(0,0,0,0.15);
}
.glass-card .glass-stats{
  display:flex;gap:16px;
}
.glass-card .glass-stat{
  flex:1;text-align:center;
  padding:12px;border-radius:12px;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.12);
}
.glass-card .glass-stat-val{
  font-size:20px;font-weight:700;color:#fff;
  font-family:'JetBrains Mono',monospace;
}
.glass-card .glass-stat-label{
  font-size:11px;color:rgba(255,255,255,0.6);margin-top:2px;
}
.glass-card .glass-actions{
  display:flex;gap:8px;margin-top:20px;
}
.glass-card .glass-btn{
  flex:1;padding:10px;border-radius:10px;
  font-size:13px;font-weight:600;cursor:pointer;
  text-align:center;
  font-family:var(--mx-font);
  transition:all 0.2s;
}
.glass-card .glass-btn-primary{
  background:rgba(255,255,255,0.2);color:#fff;
  border:1px solid rgba(255,255,255,0.25);
}
.glass-card .glass-btn-primary:hover{background:rgba(255,255,255,0.3)}
.glass-card .glass-btn-ghost{
  background:transparent;color:rgba(255,255,255,0.7);
  border:1px solid rgba(255,255,255,0.12);
}
.glass-card .glass-btn-ghost:hover{color:#fff;border-color:rgba(255,255,255,0.25)}

/* ── 双层边框 ── */
.glass-border-layer{
  position:absolute;inset:0;pointer-events:none;
  border-radius:inherit;padding:1.5px;
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite:exclude;
  box-shadow:0 0 0 0.5px rgba(255,255,255,0.5) inset, 0 1px 3px rgba(255,255,255,0.25) inset;
}
.glass-border-layer.layer-screen{mix-blend-mode:screen;opacity:0.2;z-index:2}
.glass-border-layer.layer-overlay{mix-blend-mode:overlay;opacity:1;z-index:2}

/* ── Hover 高光 ── */
.glass-card::after{
  content:'';position:absolute;inset:0;border-radius:inherit;
  pointer-events:none;opacity:0;transition:opacity 0.2s;
  background-image:radial-gradient(circle at 50% 0%, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 50%);
  mix-blend-mode:overlay;z-index:3;
}
.glass-card:hover::after{opacity:0.5}

/* ── 标题 ── */
.page-title{
  position:fixed;top:20px;right:20px;z-index:100;
  font-size:13px;font-weight:600;color:rgba(255,255,255,0.5);
}

/* ── Loading ── */
.loading{
  position:fixed;inset:0;z-index:200;
  display:flex;align-items:center;justify-content:center;
  background:var(--mx-bg);color:var(--mx-t3);font-size:14px;
  transition:opacity 0.4s;
}
.loading.hidden{opacity:0;pointer-events:none}

@media(max-width:640px){
  .glass-card{padding:28px 24px;width:90vw}
  .glass-card h2{font-size:18px}
  .glass-card .glass-stats{flex-direction:column;gap:8px}
  .controls{flex-wrap:wrap;justify-content:center;max-width:90vw}
}
</style>
</head>
<body>

<!-- Loading -->
<div class="loading" id="loading">加载中...</div>

<!-- Bing 背景 -->
<div class="bing-bg" id="bingBg"></div>

<!-- 返回 -->
<a class="back-btn" href="index.html">
  <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
  返回
</a>

<!-- 标题 -->
<div class="page-title">Liquid Glass</div>

<!-- 居中玻璃卡片 -->
<div class="glass-center">
  <div class="glass-card mx-glass-trackable" id="glassCard">
    <div class="glass-border-layer layer-screen"></div>
    <div class="glass-border-layer layer-overlay"></div>
    <h2>💎 Liquid Glass</h2>
    <p>基于 Apple 的 Liquid Glass 效果移植，支持 4 种折射模式、RGB 色差分离、鼠标跟踪弹性变形。</p>
    <div class="glass-stats">
      <div class="glass-stat"><div class="glass-stat-val" id="statMode">Standard</div><div class="glass-stat-label">模式</div></div>
      <div class="glass-stat"><div class="glass-stat-val" id="statDisp">25</div><div class="glass-stat-label">位移</div></div>
      <div class="glass-stat"><div class="glass-stat-val" id="statAberr">2</div><div class="glass-stat-label">色差</div></div>
    </div>
    <div class="glass-actions">
      <button class="glass-btn glass-btn-primary" onclick="toggleGlass()">切换效果</button>
      <button class="glass-btn glass-btn-ghost" onclick="cycleMode()">切换模式</button>
    </div>
  </div>
</div>

<!-- 模式切换 -->
<div class="controls">
  <button class="active" data-mode="standard" onclick="setMode('standard')">Standard</button>
  <button data-mode="polar" onclick="setMode('polar')">Polar</button>
  <button data-mode="prominent" onclick="setMode('prominent')">Prominent</button>
  <button data-mode="shader" onclick="setMode('shader')">Shader</button>
  <span class="sep"></span>
  <button onclick="toggleGlass()">💎 开关</button>
</div>

<script src="../utils/glass.js"></script>
<script>
// ── Bing 每日一图 ──
(function loadBingBg() {
  const img = new Image();
  // Bing 每日一图 API
  const url = 'https://www.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1';
  fetch(url)
    .then(r => r.json())
    .then(data => {
      const imgUrl = 'https://www.bing.com' + data.images[0].url;
      img.onload = () => {
        document.getElementById('bingBg').style.backgroundImage = `url(${imgUrl})`;
        document.getElementById('loading').classList.add('hidden');
      };
      img.onerror = loadFallback;
      img.src = imgUrl;
    })
    .catch(loadFallback);

  function loadFallback() {
    // Fallback: 使用固定的高质量图片
    document.getElementById('bingBg').style.backgroundImage =
      `url(https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80)`;
    document.getElementById('loading').classList.add('hidden');
  }
})();

// ── Glass 控制 ──
let glassEnabled = true;
const modes = ['standard', 'polar', 'prominent', 'shader'];
let currentMode = 0;

function toggleGlass() {
  glassEnabled = !glassEnabled;
  if (glassEnabled) {
    MxGlass.enable();
    MxGlass.track(document.getElementById('glassCard'));
  } else {
    MxGlass.disable();
    MxGlass.untrack(document.getElementById('glassCard'));
    // 移除 transform
    document.getElementById('glassCard').style.transform = '';
  }
}

function setMode(mode) {
  MxGlass.setMode(mode);
  currentMode = modes.indexOf(mode);
  updateUI();
}

function cycleMode() {
  currentMode = (currentMode + 1) % modes.length;
  MxGlass.setMode(modes[currentMode]);
  updateUI();
}

function updateUI() {
  const mode = modes[currentMode];
  document.getElementById('statMode').textContent = mode.charAt(0).toUpperCase() + mode.slice(1);
  document.getElementById('statDisp').textContent = MxGlass.getDisplacement();
  document.getElementById('statAberr').textContent = MxGlass.getAberration();
  // 更新按钮状态
  document.querySelectorAll('.controls button[data-mode]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
}

// ── Init ──
MxGlass.enable();
MxGlass.track(document.getElementById('glassCard'));
updateUI();
</script>
</body>
</html>
